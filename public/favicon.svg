<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Activity Diary app icon: a day-clock on a calm blue tile -->
  <rect width="64" height="64" rx="14" fill="#2a78d6"/>
  <circle cx="32" cy="32" r="19" fill="#fcfcfb"/>
  <!-- colored activity arcs (categorical palette slots) -->
  <path d="M32 13 A19 19 0 0 1 48.5 22.5 L32 32 Z" fill="#eda100"/>
  <path d="M48.5 22.5 A19 19 0 0 1 45.4 45.4 L32 32 Z" fill="#1baf7a"/>
  <path d="M45.4 45.4 A19 19 0 0 1 18.6 45.4 L32 32 Z" fill="#4a3aa7"/>
  <!-- clock hands -->
  <line x1="32" y1="32" x2="32" y2="20" stroke="#0b0b0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="40" y2="36" stroke="#0b0b0b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="32" r="2.6" fill="#0b0b0b"/>
</svg>
