<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2a78d6" />

    <title>Activity Diary – see how your days are really spent | Aktivitetsdagboken</title>
    <meta
      name="description"
      content="Free activity diary for occupational balance: log sleep, work, social life, chores and fun through the day, see it in charts and numbers, and export reports. In English & Swedish. All data stays on your device. / Kostnadsfri aktivitetsdagbok: registrera vardagens aktiviteter, se balansen i diagram och siffror, exportera rapporter. All data stannar på din enhet."
    />
    <link rel="canonical" href="https://norrtou.github.io/activitydiary/" />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Activity Diary – see how your days are really spent" />
    <meta
      property="og:description"
      content="Log your daily activities, see the balance between sleep, work, social life and fun — visually and in numbers. Private by design: everything stays on your device."

    <meta property="og:url" content="https://norrtou.github.io/activitydiary/" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:locale:alternate" content="sv_SE" />
    <meta name="twitter:card" content="summary" />

    <!-- Structured data for search engines and AI agents -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Activity Diary",
        "alternateName": "Aktivitetsdagboken",
        "url": "https://norrtou.github.io/activitydiary/",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "Any (web browser)",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "inLanguage": ["en", "sv"],
        "description": "A free, private activity diary for tracking everyday activities and occupational balance. Log sleep, work, social life, chores and leisure through the day; view charts and numbers; export CSV, JSON and PDF reports. All data is stored locally on the user's device — useful in occupational therapy.",
        "featureList": [
          "Visual day timeline for registering activities",
          "Week overview",
          "Charts and statistics for occupational balance",
          "Energy and mood tracking per activity",
          "Export to CSV, JSON and PDF report",
          "English and Swedish interface",
          "Works offline, data stays on device"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <p>
        Activity Diary is a free web app for logging daily activities and seeing your occupational

      </p>
      <p lang="sv">
        Aktivitetsdagboken är en kostnadsfri webbapp för att registrera vardagens aktiviteter och se
        din aktivitetsbalans i diagram och siffror. Den behöver JavaScript — aktivera det för att
